<section class="disqus">
    <div id="disqus_thread"></div>
    <script type="text/javascript">

        var disqus_config = function () {
            this.page.url = '{{ site.url }}{{ page.url | replace:"index.html","" }}';
            this.page.identifier = '{{ page.id }}';
        };
        var disqus_shortname = '{{ site.disqus.shortname }}';
        var disqus_developer = 0;
        (function() {
            var dsq = document.createElement('script'); dsq.type = 'text/javascript'; dsq.async = true;
            dsq.src = 'https://' + disqus_shortname + '.disqus.com/embed.js';
            (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(dsq);
        })();
    </script>
    <noscript>Habilite o JavaScript para vizualizar os <a href="http://disqus.com/?ref_noscript">coment&aacute;rios do Disqus.</a></noscript>
    <a href="http://disqus.com" class="dsq-brlink">coment&aacute;rios do <span class="logo-disqus">Disqus</span></a>
</section>
